services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-koda}
      POSTGRES_USER: ${DB_USER:-koda}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-koda}
    ports:
      - "${DB_PORT:-9999}:9999"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-koda}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - koda-net

  api:
    build:
      context: ./api
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-koda}
      DB_USER: ${DB_USER:-koda}
      DB_PASSWORD: ${DB_PASSWORD:-koda}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - koda-net

  web:
    build:
      context: ./web
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - koda-net

volumes:
  pg_data:

networks:
  koda-net:
    driver: bridge
