services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: koda
      POSTGRES_USER: koda
      POSTGRES_PASSWORD: koda
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koda"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
