server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:koda}
    username: ${DB_USER:koda}
    password: ${DB_PASSWORD:koda}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

koda:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-256-bits-long}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  rate-limit:
    max-attempts: 5
    lockout-minutes: 15
